<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="mapa.css">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

</head>
<body>
    
    <section id="mapa"></section><!--este div define que tan grande es el mapa-->

    <input type="text" id="barraBusqueda" class="barraBusqueda" placeholder="Buscar Edificios o Areas de Interes">
    <section id="contenedorBusqueda" class="contenedorBusqueda"></section><!--contenedor donde se muestran las recomendaciones al buscar-->

    <!--Menu-->
    <aside id="tarjetaMapa" class="tarjetaMapa">    

        <!--Contenido del edificio-->
        <section class="menu" id="menuInfo">

            <!--Header del menu-->
            <section class="header">
                <div>
                    <h2 id="nombreEdificio"></h2>
                    <span id="tipoEdificio" class="tipotag"></span>
                </div>
                <button id="Cerrar" class="cerrar">✕</button>
            </section>

            <!--Foto del edificio-->
            <section class="menu-seccion">
                <section class="foto-edificio" id="fotoEdificio">   
                    <span class="foto-placeholder-icono">🏢</span>
                    <span class="foto-placeholder-texto">Sin foto disponible</span>
                </section>
            </section>

            <section id="vistaSimple" class="menu-seccion">
                <button id="btnIrReporte" class="btn-reportar">Reportar</button>
            </section>

            <section id="formularioReporte" style="display:none;">
                <form action="" method="POST" enctype="multipart/form-data">

                    <!-- Aulas -->
                    <section class="menu-seccion">

                        <!--boton para volver a la vista simple-->
                        <button type="button" id="btnVolver" class="btn-reportar">← Volver</button>

                        <h4>Aulas</h4>
                        <select id="aula" name="aula" required>
                            <option value="" disabled selected>Selecciona un Aula</option>
                        </select>
                    </section>

                    <!-- Tipo de reporte -->
                    <section class="menu-seccion">
                        <h3 class="menu-seccion-titulo">Tipo de reporte</h3>
                        <section class="tipo-reporte-opciones">
                            <label class="tipo-opcion">
                                <input type="radio" name="tipo" value="inmobiliario" required>
                                <span class="tipo-opcion-inner">
                                    <span class="tipo-opcion-icono">🏗</span>
                                    <span>Inmobiliario</span>
                                </span>
                            </label>

                            <label class="tipo-opcion">
                                <input type="radio" name="tipo" value="recursos">
                                <span class="tipo-opcion-inner">
                                    <span class="tipo-opcion-icono">📦</span>
                                    <span>Falta de recursos</span>
                                </span>
                            </label>
                        </section>
                    </section>

                    <!-- Descripción del reporte -->
                    <section class="menu-seccion">
                        <h3 class="menu-seccion-titulo">Descripción del problema</h3>
                        <textarea
                            id="descripcionReporte" class="desc-reporte" name="descripcion"
                            placeholder="Ej: el baño en este edificio no sirve..."
                            rows="3" required></textarea>
                    </section>

                    <!-- Cargar foto -->
                    <section class="menu-seccion">
                        <h3 class="menu-seccion-titulo">
                            Foto del problema <span class="obligatorio">* obligatoria</span>
                        </h3>

                        <label class="subirfoto">
                            <input type="file" name="foto" id="fotoReporte" accept="image/*" style="display:none;" required>

                            <section class="subirfoto-contenido">
                                <span class="icono">📷</span>
                                <span class="texto">Toca para cargar una foto</span>
                                <span class="subtexto">JPG, PNG o HEIC</span>
                            </section>

                            <img id="previewFoto" class="preview-foto" style="display:none;">
                        </label>

                        <button type="button" class="btn-quitar-foto" id="btnQuitarFoto" style="display:none;">
                            ✕ Quitar foto
                        </button>
                    </section>

                    <!-- Botón reportar-->
                    <section class="menu-seccion">
                        <button type="submit" class="btn-reportar">Reportar incidencia</button>
                    </section>

                </form>
            </section>
        </section>
    </aside>

    <!--Menu de header y footer-->
    <aside id="menuDerecha" class="menuDerecha">
        <section class="contenidoMenuDerecha">

            <section class="menuDerecha-header">
            <span>Opciones</span>
            <button id="cerrarDerecha" class="cerrar">✕</button>
            </section>

            <nav class="menuDerecha-nav">
            <a href="mapa.html" class="menuDerecha-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="3,11 12,2 21,11"/><path d="M5 11v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg>
                Mapa
            </a>
            <a href="../reportes/misReportes.html" class="menuDerecha-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                Mis Reportes
            </a>
            <a href="../chatBot/chatBot.html" class="menuDerecha-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                PoliBot
            </a>
            <a href="../ayuda/ayuda.html" class="menuDerecha-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                Ayuda
            </a>
            </nav>

        </section>
    </aside>

    <section id="btnderecha">
        <button id="abrirDerecha" class="botones">Explorar</button>
    </section>
    
    <section id="bntsfuncionesmap">
        <button id="botonCentrar" class="botones">⌖ Centrar</button><!--este boton centra el mapa a la posicion y zoom original-->
        <button id="botonVista" class="botones">⊞ Vista</button>
    </section>
   
<script type="module" src="mapa.js"></script>
<script src="menurep.js"></script>
</body>
</html>
